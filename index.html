<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChapAI - El Logo Real</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0d14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* Contenedor con animación de flotación suave */
        .logo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            animation: float 4s ease-in-out infinite;
        }

        /* Tu imagen real, limpia, rotando de forma impecable */
        .real-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.6)); /* Le da el toque neón */
            animation: spin 25s linear infinite;
        }

        /* Brillo místico en el fondo */
        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.3) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite alternate;
            z-index: -1;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            letter-spacing: 2px;
            margin: 15px 0 5px;
        }

        p {
            color: #64748b;
            font-size: 14px;
        }

        /* === ANIMACIONES PROFESIONALES === */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <div class="glow-effect"></div>
            <img src="logo.PNG" alt="ChapAI Logo" class="real-logo">
        </div>
        <h1>ChapAI</h1>
        <p>Ahora sí, con el logo original</p>
    </div>

</body>
</html>
