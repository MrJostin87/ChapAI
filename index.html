<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChapAI - Logo Test V2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0d14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* Contenedor del Logo con animación de flotado sutil */
        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            animation: float 3.5s ease-in-out infinite;
        }

        /* El SVG que rota elegantemente */
        .ai-svg {
            width: 100%;
            height: 100%;
            transform-origin: center;
            animation: spinGeom 12s linear infinite;
        }

        /* Estilo de las líneas del logo estilo ChatGPT */
        .ai-path {
            stroke: #00ffcc; /* Color neón cyan */
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 100;
            animation: drawLines 4s ease-in-out infinite alternate;
        }

        /* Brillo de fondo */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, rgba(0, 255, 20c, 0.25) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(4px);
            animation: pulseGlow 2s ease-in-out infinite alternate;
            pointer-events: none;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin: 0 0 8px 0;
        }

        p {
            color: #64748b;
            font-size: 14px;
            margin: 0;
        }

        /* === ANIMACIONES === */

        /* 1. Flotación limpia de arriba a abajo */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* 2. Rotación continua, suave y profesional de la geometría */
        @keyframes spinGeom {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 3. Efecto de "energía" recorriendo las líneas */
        @keyframes drawLines {
            0% { stroke-dashoffset: 100; stroke-width: 1.5; opacity: 0.6; }
            100% { stroke-dashoffset: 0; stroke-width: 2.5; opacity: 1; stroke-color: #00bfff; }
        }

        /* 4. Pulso del brillo místico trasero */
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <div class="glow"></div>
            <!-- SVG con una estructura de bucles entrelazados más cercana a ChatGPT -->
            <svg class="ai-svg" viewBox="0 0 100 100">
                <!-- Centro -->
                <circle cx="50" cy="50" r="4" fill="#00ffcc" />
                <!-- Pétalos/Bucles Geométricos con curvas limpias -->
                <path class="ai-path" d="M50,50 C40,30 30,40 50,50 C60,30 70,40 50,50 C40,70 30,60 50,50 C60,70 70,60 50,50" />
                <path class="ai-path" d="M50,50 C30,40 40,30 50,50 C70,40 60,30 50,50 C30,60 40,70 50,50 C70,60 60,70 50,50" style="animation-delay: -1s; stroke: #00ccff;" />
                <path class="ai-path" d="M50,50 C35,35 45,25 50,50 C65,35 55,25 50,50 C35,65 45,75 50,50 C65,65 55,75 50,50" style="animation-delay: -2s;" />
            </svg>
        </div>
        <h1>ChapAI</h1>
        <p>Prototipo de Logo Animado V2</p>
    </div>

</body>
</html>
