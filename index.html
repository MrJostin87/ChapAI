<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChapAI - Funcionalidad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #07080a;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            opacity: 0.6;
            font-size: 14px;
        }

        /* Contenedor principal que aloja la bienvenida o el chat */
        .display-area {
            flex: 1;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 5px;
        }

        /* Oculta la barra de scroll visualmente pero mantiene la función */
        .display-area::-webkit-scrollbar {
            width: 4px;
        }
        .display-area::-webkit-scrollbar-thumb {
            background: #282a34;
            border-radius: 10px;
        }

        /* Pantalla de Bienvenida Inicial */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            animation: float 4s ease-in-out infinite;
        }

        .real-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(0, 255, 204, 0.5));
            animation: spin 30s linear infinite;
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite alternate;
            z-index: -1;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            margin: 0 0 12px 0;
        }

        .welcome-screen p {
            color: #9ca3af;
            font-size: 16px;
            margin: 0;
            max-width: 280px;
            line-height: 1.4;
        }

        /* Contenedor del Historial de Chat (Aparece al escribir) */
        .chat-history {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 15px;
            justify-content: flex-end;
        }

        /* Burbujas de mensajes */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: #282a34;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chapai-msg {
            background-color: #181a20;
            color: #e5e7eb;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #00ffcc;
        }

        /* Barra de Entrada */
        .input-container {
            width: 100%;
            max-width: 480px;
            background-color: #181a20;
            border-radius: 30px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .input-box {
            flex: 1;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            padding: 10px 8px;
            outline: none;
        }

        .input-box::placeholder {
            color: #6b7280;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            outline: none;
        }

        .send-btn {
            background-color: #282a34;
            color: #ffffff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin-left: 5px;
            justify-content: center;
        }

        /* Animaciones */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>ChapAI v1.0</span>
        <span>⚡ Local-Lógica</span>
    </div>

    <!-- Área dinámica que cambia de Bienvenida a Chat -->
    <div class="display-area" id="displayArea">
        
        <!-- Pantalla de Bienvenida -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="logo-wrapper">
                <div class="glow-effect"></div>
                <img src="logo.PNG" alt="ChapAI" class="real-logo">
            </div>
            <h1>¡Hola! Soy ChapAI</h1>
            <p>Tu inteligencia personal de navegación. ¿En qué puedo ayudarte hoy?</p>
        </div>

        <!-- Historial de Chat (Inicia oculto) -->
        <div class="chat-history" id="chatHistory"></div>

    </div>

    <!-- Formulario de Entrada de Mensajes -->
    <div class="input-container">
        <button class="icon-btn">+</button>
        <input type="text" class="input-box" id="userInput" placeholder="Pregúntale a ChapAI..." autocomplete="off">
        <button class="icon-btn">🎙️</button>
        <button class="icon-btn send-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const chatHistory = document.getElementById('chatHistory');
        const displayArea = document.getElementById('displayArea');

        // Función para procesar y enviar mensajes
        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            // 1. Ocultar bienvenida y mostrar chat si es el primer mensaje
            if (welcomeScreen.style.display !== 'none') {
                welcomeScreen.style.display = 'none';
                chatHistory.style.display = 'flex';
                displayArea.style.justifyContent = 'flex-end'; // Alinea el chat abajo
            }

            // 2. Agregar mensaje del usuario al chat
            appendMessage(text, 'user-msg');
            userInput.value = ""; // Limpiar input

            // 3. Generar respuesta automática de ChapAI después de un pequeño delay
            setTimeout(() => {
                const botResponse = getChapResponse(text);
                appendMessage(botResponse, 'chapai-msg');
                // Auto-scroll al último mensaje
                displayArea.scrollTop = displayArea.scrollHeight;
            }, 500);
        }

        // Función para añadir los globos de texto al HTML
        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', className);
            msgDiv.innerHTML = text; 
            chatHistory.appendChild(msgDiv);
            displayArea.scrollTop = displayArea.scrollHeight;
        }

        // LÓGICA REESTRUCTURADA (Formato ultra seguro a prueba de errores)
        function getChapResponse(input) {
            const query = input.toLowerCase();

            // Identidad y Nombre
            if (query.includes('como te llamas') || query.includes('tu nombre') || query.includes('quien eres') || query.includes('que eres')) {
                return "🤖 <b>¡Hola! Yo soy ChapAI</b>, tu asistente virtual e inteligencia artificial personal diseñada exclusivamente para acompañarte en tu navegación por <b>MrTube</b>.<br><br>" +
                       "Mi objetivo principal es ayudarte a descubrir contenido, moverte rápidamente por las secciones y responder a todas tus dudas de forma interactiva. ⚡<br><br>" +
                       "¿Hay algo específico que te gustaría explorar en este momento? ¡Solo dime!";
            }
            
            // Saludos básicos
            else if (query.includes('hola') || query.includes('que tal') || query.includes('buenas')) {
                return "👋 <b>¡Hola! Qué excelente tenerte por aquí de nuevo.</b><br><br>" +
                       "Espero que estés teniendo un día increíble. Como tu guía personal, estoy totalmente listo y conectado para ayudarte a encontrar lo que necesites dentro de la plataforma. 🚀<br><br>" +
                       "💡 <i>Prueba pidiéndome cosas como ver 'videos' o explorar nuestros 'juegos'. ¿Qué plan tienes para hoy?</i>";
            } 
            
            // Ayuda y Funciones
            else if (query.includes('ayuda') || query.includes('que haces') || query.includes('funciones')) {
                return "🛠️ <b>¿Necesitas un poco de guía? ¡Para eso estoy aquí!</b><br><br>" +
                       "Como asistente de navegación de MrTube, puedo procesar comandos clave para facilitarte las cosas. Aquí tienes una lista de lo que puedes consultar conmigo:<br><br>" +
                       "🎬 <b>Videos:</b> Escribe 'videos' o 'ver series' para enterarte de lo último en animaciones.<br>" +
                       "🎮 <b>Juegos:</b> Escribe 'juegos' o 'proyectos' para conocer los desarrollos interactivos.<br>" +
                       "📌 <b>Identidad:</b> Pregúntame cómo me llamo para recordarte mis funciones.<br><br>" +
                       "¿Cuál de estas opciones te interesa revisar primero? ✨";
            } 
            
            // Sección de Videos y Animaciones
            else if (query.includes('video') || query.includes('ver') || query.includes('serie')) {
                return "🎬 <b>¡Prepara las palomitas! Estás en la sección correcta.</b><br><br>" +
                       "En MrTube nos apasiona el contenido visual de alta calidad. Contamos con un reproductor optimizado para que sigas de cerca las mejores series animadas y crossovers del estudio sin interrupciones. 🍿🍿<br><br>" +
                       "Si estás listo para empezar a reproducir tus capítulos favoritos, dime y te guiaré directo a la cartelera de videos principal. 🏁";
            } 
            
            // Sección de Juegos y Proyectos
            else if (query.includes('juego') || query.includes('proyecto') || query.includes('strike') || query.includes('github')) {
                return "🎮 <b>¡Zona de Desarrollo e Interactividad Activa!</b><br><br>" +
                       "¡Esto te va a encantar! Actualmente estamos subiendo proyectos geniales directamente en nuestras plataformas de <b>GitHub Pages</b>.<br><br>" +
                       "Uno de los proyectos más destacados del momento es la versión <b>Beta de Chicken Strike NPC</b>, donde puedes testear mecánicas y divertirte a lo grande desde el navegador. 🕹️🔥<br><br>" +
                       "¡Te recomiendo totalmente echarle un ojo si eres fanático de la acción interactiva!";
            } 

            // Agradecimientos
            else if (query.includes('gracias') || query.includes('buenisimo') || query.includes('genial') || query.includes('epico')) {
                return "🤝 <b>¡No hay de qué!</b><br><br>" +
                       "Me alegra muchísimo saber que la información te ha sido de utilidad. Mi misión es hacer que tu experiencia aquí sea impecable y súper fluida. 😎👌<br><br>" +
                       "Estaré flotando por aquí en caso de que te surja otra duda o quieras saltar a otra sección de la página.";
            }
            
            // Respuesta por defecto
            else {
                return "🤔 <b>Vaya, una pregunta muy interesante...</b><br><br>" +
                       "Actualmente funciono como un asistente local optimizado para guiarte en <b>MrTube</b>, por lo que mi base de datos todavía no reconoce esa frase en específico. 🧠💨<br><br>" +
                       "¡No te preocupes! Siempre podemos volver al camino principal. Intenta consultarme usando palabras como <b>'ayuda'</b>, <b>'videos'</b>, <b>'juegos'</b> o pregúntame sobre mi <b>'nombre'</b>. ¡Estaré esperando!";
            }
        }

        // Vincular eventos de forma limpia
        sendBtn.onclick = sendMessage;
        userInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        };
    </script>

</body>
</html>
